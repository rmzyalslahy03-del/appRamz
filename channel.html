<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>انضمام إلى قناة | RamzApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #222;
            --text: #fff;
            --text2: #ddd;
            --text3: #999;
            --accent: #ff0050;
            --accent2: #ff6b8a;
            --border: #2c2c2c;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --font: 'Cairo', 'Segoe UI', 'Arial', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: var(--font);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: var(--text);
            padding: 20px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }
        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 30px 24px;
            width: 340px;
            max-width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: popIn 0.4s ease;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .channel-icon {
            font-size: 64px;
            margin-bottom: 8px;
        }
        .channel-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .channel-desc {
            color: var(--text3);
            font-size: 14px;
            margin-bottom: 4px;
        }
        .channel-followers {
            color: var(--text3);
            font-size: 12px;
            margin-bottom: 22px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 80, 0.35);
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn.secondary {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }
        .btn.secondary:hover {
            background: var(--accent);
            color: #fff;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .error-msg {
            color: #ff4444;
            font-size: 14px;
            margin-top: 12px;
        }
        .footer {
            color: var(--text3);
            font-size: 11px;
            text-align: center;
        }
        .global-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 13px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            font-family: var(--font);
            box-shadow: var(--shadow);
            white-space: nowrap;
        }
        .global-toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="logo">💬 RamzApp</div>

    <div class="card" id="card">
        <!-- حالة التحميل -->
        <div id="loadingState">
            <span class="loading-spinner"></span>
            <span style="color: var(--text3);">جاري التحقق من القناة...</span>
        </div>

        <!-- المحتوى الرئيسي -->
        <div id="contentState" class="hidden">
            <div class="channel-icon" id="channelIcon">📢</div>
            <div class="channel-name" id="channelName">...</div>
            <div class="channel-desc" id="channelDesc"></div>
            <div class="channel-followers" id="channelFollowers">0 متابع</div>

            <button class="btn" id="joinBtn" style="display:none;">
                <i class="fas fa-plus-circle"></i> انضمام إلى القناة
            </button>

            <button class="btn secondary" id="loginFirstBtn" style="display:none;">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول أولاً
            </button>

            <button class="btn" id="loadingBtn" style="display:none;" disabled>
                <span class="loading-spinner"></span> جاري...
            </button>

            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <div class="footer">© 2026 RamzApp v4.0</div>
    <div class="global-toast" id="toastMsg"></div>

    <script src="supabase.js"></script>
    <script>
        // ================================================================
        // دوال مساعدة
        // ================================================================
        function showToast(msg, duration = 2500) {
            const el = document.getElementById('toastMsg');
            if (!el) return;
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._hideTimer);
            el._hideTimer = setTimeout(() => { el.classList.remove('show'); }, duration);
        }

        function getCurrentUser() {
            try {
                const raw = localStorage.getItem('ramzapp_user');
                if (raw) return JSON.parse(raw);
            } catch(e) { return null; }
            return null;
        }

        function getSupabase() {
            if (window.supabaseClient) return window.supabaseClient;
            if (typeof supabaseJs !== 'undefined' && supabaseJs.createClient) {
                const client = supabaseJs.createClient(
                    'https://serlegwdzjulfcxabxzv.supabase.co',
                    'sb_publishable_4_c97KxnG_7HTvfv-pKeNQ_FTlnK6Yx'
                );
                window.supabaseClient = client;
                return client;
            }
            return null;
        }

        // ================================================================
        // قراءة معامل الرابط
        // ================================================================
        const urlParams = new URLSearchParams(window.location.search);
        const inviteCode = urlParams.get('code');

        // ================================================================
        // عناصر DOM
        // ================================================================
        const loadingState = document.getElementById('loadingState');
        const contentState = document.getElementById('contentState');
        const channelIcon = document.getElementById('channelIcon');
        const channelName = document.getElementById('channelName');
        const channelDesc = document.getElementById('channelDesc');
        const channelFollowers = document.getElementById('channelFollowers');
        const joinBtn = document.getElementById('joinBtn');
        const loginFirstBtn = document.getElementById('loginFirstBtn');
        const loadingBtn = document.getElementById('loadingBtn');
        const errorMsg = document.getElementById('errorMsg');

        // ================================================================
        // التحقق من صحة الرابط
        // ================================================================
        if (!inviteCode) {
            loadingState.innerHTML = `
                <span style="color: #ff4444; font-size: 32px; display: block; margin-bottom: 8px;">❌</span>
                <span style="color: var(--text3);">رابط غير صالح</span>
                <button class="btn secondary" onclick="window.location.href='index.html'" style="margin-top:16px;">
                    <i class="fas fa-home"></i> العودة للرئيسية
                </button>
            `;
            throw new Error('رابط غير صالح');
        }

        // ================================================================
        // جلب بيانات القناة
        // ================================================================
        async function loadChannel() {
            try {
                const supabase = getSupabase();
                if (!supabase) {
                    throw new Error('تعذر الاتصال بقاعدة البيانات');
                }

                // جلب القناة عبر رمز الدعوة
                const { data: channel, error } = await supabase
                    .from('channels')
                    .select('*')
                    .eq('invite_code', inviteCode)
                    .single();

                if (error || !channel) {
                    throw new Error('القناة غير موجودة أو تم حذفها');
                }

                // عرض بيانات القناة
                loadingState.classList.add('hidden');
                contentState.classList.remove('hidden');

                channelIcon.textContent = channel.avatar || '📢';
                channelName.textContent = channel.name || 'قناة';
                channelDesc.textContent = channel.description || '';
                channelFollowers.textContent = `${channel.followers || 0} متابع`;

                // التحقق من حالة تسجيل الدخول
                const currentUser = getCurrentUser();

                if (currentUser && currentUser.id) {
                    // مستخدم مسجل
                    joinBtn.style.display = 'block';
                    loginFirstBtn.style.display = 'none';

                    // التحقق مما إذا كان المستخدم مشتركاً بالفعل
                    const { data: subscription } = await supabase
                        .from('channel_subscribers')
                        .select('*')
                        .eq('channel_id', channel.id)
                        .eq('user_id', currentUser.id)
                        .maybeSingle();

                    if (subscription) {
                        joinBtn.textContent = '✅ أنت مشترك بالفعل';
                        joinBtn.disabled = true;
                        joinBtn.style.opacity = '0.7';
                    } else {
                        joinBtn.textContent = '📢 انضمام إلى القناة';
                        joinBtn.disabled = false;
                        joinBtn.onclick = () => joinChannel(channel.id);
                    }
                } else {
                    // غير مسجل
                    joinBtn.style.display = 'none';
                    loginFirstBtn.style.display = 'block';
                    loginFirstBtn.onclick = () => {
                        localStorage.setItem('ramzapp_deep_link_channel', channel.id);
                        window.location.href = 'login.html';
                    };
                }

            } catch (e) {
                console.error('❌ خطأ:', e);
                loadingState.innerHTML = `
                    <span style="color: #ff4444; font-size: 32px; display: block; margin-bottom: 8px;">⚠️</span>
                    <span style="color: var(--text3);">${e.message || 'حدث خطأ غير متوقع'}</span>
                    <button class="btn secondary" onclick="location.reload()" style="margin-top:16px;">
                        <i class="fas fa-redo"></i> إعادة المحاولة
                    </button>
                    <button class="btn secondary" onclick="window.location.href='index.html'" style="margin-top:8px;">
                        <i class="fas fa-home"></i> العودة للرئيسية
                    </button>
                `;
            }
        }

        // ================================================================
        // الانضمام إلى القناة
        // ================================================================
        async function joinChannel(channelId) {
            const supabase = getSupabase();
            if (!supabase) {
                showToast('⚠️ تعذر الاتصال بقاعدة البيانات');
                return;
            }

            const currentUser = getCurrentUser();
            if (!currentUser || !currentUser.id) {
                showToast('⚠️ يجب تسجيل الدخول أولاً');
                return;
            }

            joinBtn.disabled = true;
            joinBtn.innerHTML = '<span class="loading-spinner"></span> جاري...';

            try {
                // إضافة الاشتراك
                const { error } = await supabase
                    .from('channel_subscribers')
                    .insert({
                        channel_id: channelId,
                        user_id: currentUser.id,
                        role: 'member'
                    });

                if (error) throw error;

                // تحديث عدد المتابعين
                await supabase.rpc('increment_channel_followers', { channel_id: channelId });

                // تحديث المحلي (if exists)
                if (window.inMemoryDB) {
                    const channel = window.inMemoryDB.channels?.find(c => c.id === channelId);
                    if (channel) {
                        channel.followers = (channel.followers || 0) + 1;
                        if (!channel.subscribers) channel.subscribers = [];
                        channel.subscribers.push(currentUser.id);
                    }
                }

                showToast('✅ تم الانضمام إلى القناة بنجاح!');
                joinBtn.textContent = '✅ أنت مشترك الآن';
                joinBtn.disabled = true;
                joinBtn.style.opacity = '0.7';

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (e) {
                console.error('❌ فشل الانضمام:', e);
                showToast('⚠️ فشل الانضمام: ' + (e.message || 'خطأ غير معروف'));
                joinBtn.disabled = false;
                joinBtn.innerHTML = '<i class="fas fa-plus-circle"></i> انضمام إلى القناة';
            }
        }

        // ================================================================
        // التحقق من deep link بعد تسجيل الدخول
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            const savedChannel = localStorage.getItem('ramzapp_deep_link_channel');
            if (savedChannel) {
                localStorage.removeItem('ramzapp_deep_link_channel');
                // المستخدم سجل الدخول للتو، نوجهه للانضمام
                const currentUser = getCurrentUser();
                if (currentUser && currentUser.id) {
                    joinChannel(savedChannel);
                }
            }
        });

        // ================================================================
        // بدء التحميل
        // ================================================================
        loadChannel();

        console.log('✅ channel.html (الإصدار النهائي) جاهز');
    </script>
</body>
</html>
