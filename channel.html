<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>انضمام إلى قناة | RamzApp</title>

    <!-- ===== تحميل Supabase ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- ===== Font Awesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* ======================================================================
                   الأنماط الأساسية – متوافقة مع RamzApp v5.0
                   ====================================================================== */
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #222;
            --text: #fff;
            --text2: #ddd;
            --text3: #999;
            --accent: #ff0050;
            --accent2: #ff6b8a;
            --border: #2c2c2c;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --font: 'Cairo', 'Segoe UI', 'Arial', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: var(--font);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: var(--text);
            padding: 20px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }
        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 30px 24px;
            width: 340px;
            max-width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: popIn 0.4s ease;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .channel-icon { font-size: 64px; margin-bottom: 8px; }
        .channel-name { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .channel-desc { color: var(--text3); font-size: 14px; margin-bottom: 4px; }
        .channel-followers { color: var(--text3); font-size: 12px; margin-bottom: 22px; }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 0, 80, 0.35); }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .btn-secondary {
            background: transparent !important;
            border: 2px solid var(--accent) !important;
            color: var(--accent) !important;
        }
        .btn-secondary:hover {
            background: var(--accent) !important;
            color: #fff !important;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
        .error-msg { color: #ff4444; font-size: 14px; margin-top: 12px; }

        .footer {
            color: var(--text3);
            font-size: 11px;
            text-align: center;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 13px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            font-family: var(--font);
            box-shadow: var(--shadow);
        }
        .toast.show { opacity: 1; }

        @media (max-width: 400px) {
            .logo { font-size: 36px; }
            .card { padding: 24px 18px; }
            .channel-icon { font-size: 48px; }
            .channel-name { font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- ===== الشعار ===== -->
    <div class="logo">💬 RamzApp</div>

    <!-- ===== البطاقة الرئيسية ===== -->
    <div class="card" id="card">

        <!-- حالة التحميل -->
        <div id="loadingState">
            <span class="spinner"></span>
            <span style="color: var(--text3);">جاري التحقق من القناة...</span>
        </div>

        <!-- المحتوى الرئيسي (يظهر بعد التحميل) -->
        <div id="contentState" class="hidden">
            <div class="channel-icon" id="channelIcon">📢</div>
            <div class="channel-name" id="channelName">...</div>
            <div class="channel-desc" id="channelDesc"></div>
            <div class="channel-followers" id="channelFollowers">0 متابع</div>

            <button class="btn" id="joinBtn" style="display:none;">
                <i class="fas fa-plus-circle"></i> انضمام إلى القناة
            </button>

            <button class="btn btn-secondary" id="loginFirstBtn" style="display:none;">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول أولاً
            </button>

            <button class="btn" id="loadingBtn" style="display:none;" disabled>
                <span class="spinner"></span> جاري...
            </button>

            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <div class="footer">© 2026 RamzApp v5.0 | جميع الحقوق محفوظة</div>

    <!-- ===== Toast Container ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== تحميل السكربتات (ترتيب مهم) ===== -->
    <script src="db.js"></script>
    <script src="supabase.js"></script>
    <script src="common.js"></script>

    <script>
        (function() {
            'use strict';

            // ================================================================
            // دوال مساعدة
            // ================================================================
            function toast(message, duration = 2500) {
                const el = document.getElementById('toast');
                el.textContent = message;
                el.classList.add('show');
                clearTimeout(el._hideTimer);
                el._hideTimer = setTimeout(() => el.classList.remove('show'), duration);
            }

            function getCurrentUser() {
                try {
                    const raw = localStorage.getItem('ramzapp_user');
                    return raw ? JSON.parse(raw) : null;
                } catch(e) { return null; }
            }

            function getSupabase() {
                if (window.supabaseClient) return window.supabaseClient;
                if (typeof supabaseJs !== 'undefined' && supabaseJs.createClient) {
                    const client = supabaseJs.createClient(
                        'https://serlegwdzjulfcxabxzv.supabase.co',
                        'sb_publishable_4_c97KxnG_7HTvfv-pKeNQ_FTlnK6Yx'
                    );
                    window.supabaseClient = client;
                    return client;
                }
                return null;
            }

            // ================================================================
            // قراءة معامل الرابط
            // ================================================================
            const urlParams = new URLSearchParams(window.location.search);
            const channelId = urlParams.get('id') || urlParams.get('code');

            // ================================================================
            // عناصر DOM
            // ================================================================
            const loadingState = document.getElementById('loadingState');
            const contentState = document.getElementById('contentState');
            const channelIcon = document.getElementById('channelIcon');
            const channelName = document.getElementById('channelName');
            const channelDesc = document.getElementById('channelDesc');
            const channelFollowers = document.getElementById('channelFollowers');
            const joinBtn = document.getElementById('joinBtn');
            const loginFirstBtn = document.getElementById('loginFirstBtn');
            const loadingBtn = document.getElementById('loadingBtn');
            const errorMsg = document.getElementById('errorMsg');

            // ================================================================
            // البحث عن القناة في Supabase (بيانات عامة)
            // ================================================================
            async function fetchChannel(channelId) {
                const supabase = getSupabase();
                if (!supabase) throw new Error('تعذر الاتصال بقاعدة البيانات');

                // محاولة البحث عبر id أو invite_code
                let query = supabase.from('channels').select('*');
                if (channelId.startsWith('ch_')) {
                    query = query.eq('id', channelId);
                } else {
                    query = query.eq('invite_code', channelId);
                }
                const { data, error } = await query.single();
                if (error || !data) throw new Error('القناة غير موجودة');
                return data;
            }

            // ================================================================
            // الانضمام إلى القناة (تخزين محلي + تحديث Supabase)
            // ================================================================
            async function joinChannel(channelId) {
                const supabase = getSupabase();
                if (!supabase) throw new Error('تعذر الاتصال بقاعدة البيانات');
                const user = getCurrentUser();
                if (!user || !user.id) throw new Error('يجب تسجيل الدخول أولاً');

                // 1. تخزين محلي: إضافة القناة إلى DB المحلية (إذا لم تكن موجودة)
                let localChannels = window.getChannels ? window.getChannels() : [];
                let channel = localChannels.find(c => c.id === channelId);
                if (!channel) {
                    // جلب بيانات القناة من Supabase (عامة)
                    const channelData = await fetchChannel(channelId);
                    channel = {
                        id: channelData.id,
                        name: channelData.name,
                        avatar: channelData.avatar || '📢',
                        description: channelData.description || '',
                        followers: channelData.followers || 0,
                        invite_code: channelData.invite_code,
                        created_by: channelData.created_by,
                        subscribers: [],
                        is_subscribed: true
                    };
                    window.addChannel ? window.addChannel(channel) : null;
                } else {
                    // تحديث الاشتراك
                    channel.is_subscribed = true;
                    if (!channel.subscribers) channel.subscribers = [];
                    if (!channel.subscribers.includes(user.id)) {
                        channel.subscribers.push(user.id);
                        channel.followers = (channel.followers || 0) + 1;
                    }
                    window.saveChannel ? window.saveChannel(channel) : null;
                }

                // 2. تحديث Supabase (إضافة المشترك)
                const { error } = await supabase
                    .from('channel_subscribers')
                    .upsert({
                        channel_id: channelId,
                        user_id: user.id,
                        role: 'member'
                    });
                if (error) throw error;

                // 3. زيادة عدد المتابعين في Supabase
                await supabase.rpc('increment_channel_followers', { channel_id: channelId });

                toast('✅ تم الانضمام إلى القناة');
                return true;
            }

            // ================================================================
            // التهيئة الرئيسية
            // ================================================================
            (async function init() {
                if (!channelId) {
                    loadingState.innerHTML = `
                        <span style="color: #ff4444; font-size: 32px; display: block; margin-bottom: 8px;">❌</span>
                        <span style="color: var(--text3);">رابط غير صالح</span>
                        <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="margin-top:16px;">
                            <i class="fas fa-home"></i> العودة للرئيسية
                        </button>
                    `;
                    return;
                }

                try {
                    // 1. جلب بيانات القناة
                    const channel = await fetchChannel(channelId);

                    // 2. عرض البيانات
                    loadingState.classList.add('hidden');
                    contentState.classList.remove('hidden');

                    channelIcon.textContent = channel.avatar || '📢';
                    channelName.textContent = channel.name || 'قناة';
                    channelDesc.textContent = channel.description || '';
                    channelFollowers.textContent = `${channel.followers || 0} متابع`;

                    // 3. التحقق من حالة تسجيل الدخول
                    const currentUser = getCurrentUser();

                    if (currentUser && currentUser.id) {
                        // مستخدم مسجل
                        joinBtn.style.display = 'block';
                        loginFirstBtn.style.display = 'none';

                        // التحقق مما إذا كان المستخدم مشتركاً بالفعل (محلياً أو عبر Supabase)
                        let isSubscribed = false;
                        const localChannels = window.getChannels ? window.getChannels() : [];
                        const localChannel = localChannels.find(c => c.id === channel.id);
                        if (localChannel && localChannel.is_subscribed) {
                            isSubscribed = true;
                        } else {
                            // التحقق من Supabase
                            const supabase = getSupabase();
                            if (supabase) {
                                const { data: sub } = await supabase
                                    .from('channel_subscribers')
                                    .select('*')
                                    .eq('channel_id', channel.id)
                                    .eq('user_id', currentUser.id)
                                    .maybeSingle();
                                isSubscribed = !!sub;
                            }
                        }

                        if (isSubscribed) {
                            joinBtn.textContent = '✅ أنت مشترك بالفعل';
                            joinBtn.disabled = true;
                            joinBtn.style.opacity = '0.7';
                        } else {
                            joinBtn.textContent = '📢 انضمام إلى القناة';
                            joinBtn.disabled = false;
                            joinBtn.onclick = async () => {
                                try {
                                    joinBtn.disabled = true;
                                    joinBtn.innerHTML = '<span class="spinner"></span> جاري...';
                                    await joinChannel(channel.id);
                                    joinBtn.textContent = '✅ تم الانضمام';
                                    joinBtn.disabled = true;
                                    joinBtn.style.opacity = '0.7';
                                    setTimeout(() => {
                                        window.location.href = 'index.html';
                                    }, 2000);
                                } catch (err) {
                                    toast('⚠️ ' + (err.message || 'فشل الانضمام'));
                                    joinBtn.disabled = false;
                                    joinBtn.innerHTML = '📢 انضمام إلى القناة';
                                }
                            };
                        }
                    } else {
                        // غير مسجل
                        joinBtn.style.display = 'none';
                        loginFirstBtn.style.display = 'block';
                        loginFirstBtn.onclick = () => {
                            localStorage.setItem('ramzapp_deep_link_channel', channel.id);
                            window.location.href = 'login.html';
                        };
                    }

                } catch (err) {
                    console.error('❌ خطأ:', err);
                    loadingState.innerHTML = `
                        <span style="color: #ff4444; font-size: 32px; display: block; margin-bottom: 8px;">⚠️</span>
                        <span style="color: var(--text3);">${err.message || 'حدث خطأ غير متوقع'}</span>
                        <button class="btn btn-secondary" onclick="location.reload()" style="margin-top:16px;">
                            <i class="fas fa-redo"></i> إعادة المحاولة
                        </button>
                        <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="margin-top:8px;">
                            <i class="fas fa-home"></i> العودة للرئيسية
                        </button>
                    `;
                }
            })();

            console.log('✅ channel.html (الإصدار النهائي v5.0) جاهز');
        })();
    </script>
</body>
</html>
