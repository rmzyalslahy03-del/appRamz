<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>تعديل الملف الشخصي | RamzApp</title>

    <!-- ===== تحميل Supabase (لرفع الصور) ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- ===== Font Awesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ======================================================================
                   الأنماط الأساسية – متوافقة مع RamzApp v7.4
                   ====================================================================== */
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #222;
            --surface3: #2a2a2a;
            --text: #fff;
            --text2: #ddd;
            --text3: #999;
            --border: #2c2c2c;
            --accent: #ff0050;
            --accent2: #ff6b8a;
            --green: #00a884;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --font: 'Cairo', 'Segoe UI', 'Arial', sans-serif;
            --radius: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .light-theme {
            --bg: #f0f2f5;
            --surface: #fff;
            --surface2: #f5f5f5;
            --surface3: #e9edef;
            --text: #111;
            --text2: #333;
            --text3: #667781;
            --border: #e0e0e0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
            padding-bottom: 30px;
        }

        /* ===== الهيدر ===== */
        .header {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .back-btn:active { transform: scale(0.92); }
        .header h2 {
            font-size: 20px;
            font-weight: 700;
            flex: 1;
            text-align: center;
        }
        .save-btn {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .save-btn:active { transform: scale(0.95); }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ===== المحتوى ===== */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        /* ===== الصورة الرمزية ===== */
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }
        .avatar-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            overflow: hidden;
            background: var(--surface2);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 20px rgba(255, 0, 80, 0.15);
        }
        .avatar-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(255, 0, 80, 0.25);
        }
        .avatar-wrapper:active { transform: scale(0.97); }
        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-wrapper .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            opacity: 0.8;
        }
        .avatar-upload-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            font-weight: 600;
            display: none;
            backdrop-filter: blur(4px);
        }
        .avatar-wrapper:hover .avatar-upload-overlay { display: block; }
        .avatar-hint {
            color: var(--text3);
            font-size: 12px;
            margin-top: 8px;
        }

        /* ===== حقول الإدخال ===== */
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text2);
        }
        .input-group .field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--surface2);
            border-radius: 16px;
            border: 2px solid var(--border);
            transition: 0.2s;
        }
        .input-group .field-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 0, 80, 0.08);
        }
        .input-group .field-wrapper .icon-left {
            padding: 0 12px 0 4px;
            color: var(--text3);
            font-size: 18px;
            flex-shrink: 0;
        }
        .input-group .field-wrapper input,
        .input-group .field-wrapper textarea {
            width: 100%;
            padding: 14px 16px 14px 0;
            border: none;
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: 16px;
            outline: none;
            resize: vertical;
        }
        .input-group .field-wrapper textarea {
            min-height: 70px;
            padding: 14px 16px 14px 0;
        }
        .input-group .field-wrapper .char-counter {
            position: absolute;
            bottom: 6px;
            left: 12px;
            font-size: 11px;
            color: var(--text3);
        }
        .input-group .field-wrapper .clear-btn {
            background: none;
            border: none;
            color: var(--text3);
            cursor: pointer;
            padding: 0 12px;
            font-size: 16px;
            display: none;
            transition: 0.15s;
        }
        .input-group .field-wrapper .clear-btn:hover { color: var(--text); }
        .input-group .field-wrapper .clear-btn.visible { display: block; }

        /* ===== حقل رقم الهاتف (للقراءة فقط) ===== */
        .phone-display {
            background: var(--surface3);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text3);
            font-size: 15px;
            border: 1px solid var(--border);
        }
        .phone-display i { font-size: 18px; color: var(--green); }
        .phone-display .number { color: var(--text); font-weight: 600; }

        /* ===== الفاصل ===== */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }

        /* ===== معلومات إضافية ===== */
        .info-note {
            background: var(--surface2);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 13px;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        .info-note i { color: var(--green); font-size: 20px; }

        /* ===== زر حذف الصورة ===== */
        .delete-btn {
            background: transparent !important;
            border: 1px solid #ff4444 !important;
            color: #ff4444 !important;
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .delete-btn:hover { background: rgba(255, 68, 68, 0.08); }
        .delete-btn:active { transform: scale(0.97); }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 13px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            font-family: var(--font);
            box-shadow: var(--shadow);
        }
        .toast.show { opacity: 1; }

        /* ===== تحميل (Overlay) ===== */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 16px;
            backdrop-filter: blur(6px);
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #fff; font-size: 16px; font-weight: 600; }

        /* ===== توافق مع الشاشات الصغيرة ===== */
        @media (max-width: 400px) {
            .avatar-wrapper { width: 100px; height: 100px; }
            .avatar-wrapper .avatar-placeholder { font-size: 38px; }
            .input-group .field-wrapper input { font-size: 14px; }
            .header h2 { font-size: 16px; }
        }
    </style>
</head>
<body>

    <!-- ===== الهيدر ===== -->
    <div class="header">
        <button class="back-btn" id="backBtn"><i class="fas fa-arrow-right"></i></button>
        <h2>تعديل الملف الشخصي</h2>
        <button class="save-btn" id="saveBtn">حفظ</button>
    </div>

    <!-- ===== المحتوى ===== -->
    <div class="container">

        <!-- الصورة الرمزية -->
        <div class="avatar-section">
            <div class="avatar-wrapper" id="avatarWrapper">
                <div class="avatar-placeholder" id="avatarPlaceholder">?</div>
                <img id="avatarImg" style="display:none;" alt="صورة الملف الشخصي">
                <div class="avatar-upload-overlay"><i class="fas fa-camera"></i> تغيير الصورة</div>
            </div>
            <input type="file" id="avatarInput" accept="image/*" style="display:none;">
            <div class="avatar-hint">اضغط على الصورة لتغييرها (JPG, PNG, WEBP)</div>
        </div>

        <!-- الاسم -->
        <div class="input-group">
            <label for="nameInput">الاسم</label>
            <div class="field-wrapper">
                <span class="icon-left"><i class="fas fa-user"></i></span>
                <input type="text" id="nameInput" placeholder="أدخل اسمك" maxlength="50">
                <button class="clear-btn" id="clearNameBtn"><i class="fas fa-times-circle"></i></button>
                <span class="char-counter" id="nameCounter">0/50</span>
            </div>
        </div>

        <!-- الحالة (Bio) -->
        <div class="input-group">
            <label for="bioInput">الحالة</label>
            <div class="field-wrapper">
                <span class="icon-left"><i class="fas fa-pen"></i></span>
                <textarea id="bioInput" placeholder="أكتب شيئاً عن نفسك..." maxlength="150" rows="2"></textarea>
                <span class="char-counter" id="bioCounter">0/150</span>
            </div>
        </div>

        <!-- رقم الهاتف (للقراءة فقط) -->
        <div class="input-group">
            <label>رقم الهاتف</label>
            <div class="phone-display">
                <i class="fas fa-phone"></i>
                <span class="number" id="phoneDisplay">-</span>
                <span style="margin-right:auto;font-size:12px;color:var(--text3);">(غير قابل للتعديل)</span>
            </div>
        </div>

        <hr class="divider">

        <!-- معلومات إضافية -->
        <div class="info-note">
            <i class="fas fa-shield-alt"></i>
            <span>بياناتك الشخصية مشفرة وآمنة. يتم تحديثها على جهازك وفي السحابة.</span>
        </div>

        <!-- زر حذف الصورة -->
        <button class="delete-btn" id="deletePhotoBtn">
            <i class="fas fa-trash-alt"></i> حذف الصورة
        </button>

        <!-- زر حفظ إضافي (أسفل الصفحة) -->
        <button class="save-btn" id="saveBtnBottom" style="width:100%;margin-top:16px;padding:14px;font-size:16px;">
            <i class="fas fa-save"></i> حفظ التغييرات
        </button>
    </div>

    <!-- ===== تحميل (Overlay) ===== -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">جاري حفظ التغييرات...</div>
    </div>

    <!-- ===== Toast ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== تحميل السكربتات (ترتيب مهم) ===== -->
    <script src="db.js"></script>
    <script src="supabase.js"></script>
    <script src="common.js"></script>

    <script>
        (function() {
            'use strict';

            // ================================================================
            // دوال مساعدة
            // ================================================================
            function toast(msg, duration = 2500) {
                const el = document.getElementById('toast');
                el.textContent = msg;
                el.classList.add('show');
                clearTimeout(el._hideTimer);
                el._hideTimer = setTimeout(() => el.classList.remove('show'), duration);
            }

            function getCurrentUser() {
                try {
                    const raw = localStorage.getItem('ramzapp_user');
                    return raw ? JSON.parse(raw) : null;
                } catch(e) { return null; }
            }

            function getSupabase() {
                if (window.supabaseClient) return window.supabaseClient;
                if (typeof supabaseJs !== 'undefined' && supabaseJs.createClient) {
                    const client = supabaseJs.createClient(
                        'https://serlegwdzjulfcxabxzv.supabase.co',
                        'sb_publishable_4_c97KxnG_7HTvfv-pKeNQ_FTlnK6Yx'
                    );
                    window.supabaseClient = client;
                    return client;
                }
                return null;
            }

            // ================================================================
            // عناصر DOM
            // ================================================================
            const avatarWrapper = document.getElementById('avatarWrapper');
            const avatarPlaceholder = document.getElementById('avatarPlaceholder');
            const avatarImg = document.getElementById('avatarImg');
            const avatarInput = document.getElementById('avatarInput');
            const nameInput = document.getElementById('nameInput');
            const bioInput = document.getElementById('bioInput');
            const nameCounter = document.getElementById('nameCounter');
            const bioCounter = document.getElementById('bioCounter');
            const clearNameBtn = document.getElementById('clearNameBtn');
            const phoneDisplay = document.getElementById('phoneDisplay');
            const saveBtn = document.getElementById('saveBtn');
            const saveBtnBottom = document.getElementById('saveBtnBottom');
            const backBtn = document.getElementById('backBtn');
            const deletePhotoBtn = document.getElementById('deletePhotoBtn');
            const loadingOverlay = document.getElementById('loadingOverlay');

            let avatarFile = null;
            let currentAvatarUrl = null;
            let originalName = '';
            let originalBio = '';
            let originalAvatarUrl = null;
            let hasUnsavedChanges = false;

            // ================================================================
            // تحميل بيانات المستخدم
            // ================================================================
            async function loadUserData() {
                const user = getCurrentUser();
                if (!user) {
                    toast('⚠️ يرجى تسجيل الدخول أولاً');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                    return;
                }

                nameInput.value = user.name || '';
                bioInput.value = user.bio || '';
                originalName = user.name || '';
                originalBio = user.bio || '';
                originalAvatarUrl = user.avatar || null;
                currentAvatarUrl = user.avatar || null;

                phoneDisplay.textContent = user.phone || user.id || 'غير متاح';

                if (user.avatar && user.avatar.startsWith('http')) {
                    displayAvatar(user.avatar);
                } else {
                    displayAvatar(null);
                }

                updateCharCounts();
                updateClearButton();
                updateUnsavedChanges();

                const supabase = getSupabase();
                if (supabase && user.phone) {
                    try {
                        const { data, error } = await supabase
                            .from('users')
                            .select('name, avatar_url, bio, phone')
                            .eq('phone', user.phone)
                            .single();
                        if (!error && data) {
                            if (data.name) {
                                nameInput.value = data.name;
                                originalName = data.name;
                            }
                            if (data.bio) {
                                bioInput.value = data.bio;
                                originalBio = data.bio;
                            }
                            if (data.avatar_url) {
                                currentAvatarUrl = data.avatar_url;
                                originalAvatarUrl = data.avatar_url;
                                displayAvatar(data.avatar_url);
                            }
                            if (data.phone) {
                                phoneDisplay.textContent = data.phone;
                            }
                            const updatedUser = { ...user, name: data.name, bio: data.bio, avatar: data.avatar_url, phone: data
                                    .phone };
                            localStorage.setItem('ramzapp_user', JSON.stringify(updatedUser));
                            if (window.inMemoryDB) window.inMemoryDB.user = updatedUser;
                        }
                    } catch (e) { /* ignore */ }
                }

                updateCharCounts();
                updateClearButton();
                updateUnsavedChanges();
            }

            // ================================================================
            // عرض الصورة الرمزية
            // ================================================================
            function displayAvatar(url) {
                if (!url) {
                    avatarPlaceholder.style.display = 'flex';
                    avatarImg.style.display = 'none';
                    avatarImg.src = '';
                    currentAvatarUrl = null;
                    return;
                }
                if (url.startsWith('data:') || url.startsWith('http')) {
                    avatarImg.src = url;
                    avatarImg.style.display = 'block';
                    avatarPlaceholder.style.display = 'none';
                    currentAvatarUrl = url;
                } else {
                    const name = nameInput.value || 'م';
                    avatarPlaceholder.textContent = name.charAt(0).toUpperCase();
                    avatarPlaceholder.style.display = 'flex';
                    avatarImg.style.display = 'none';
                    currentAvatarUrl = null;
                }
            }

            // ================================================================
            // تحديث عداد الأحرف
            // ================================================================
            function updateCharCounts() {
                const nameLen = nameInput.value.length;
                const bioLen = bioInput.value.length;
                nameCounter.textContent = nameLen + '/50';
                bioCounter.textContent = bioLen + '/150';
                nameCounter.style.color = nameLen > 45 ? '#ff4444' : 'var(--text3)';
                bioCounter.style.color = bioLen > 135 ? '#ff4444' : 'var(--text3)';
            }

            // ================================================================
            // إظهار/إخفاء زر المسح
            // ================================================================
            function updateClearButton() {
                clearNameBtn.classList.toggle('visible', nameInput.value.length > 0);
            }

            // ================================================================
            // التحقق من وجود تغييرات غير محفوظة (محسّن)
            // ================================================================
            function updateUnsavedChanges() {
                const currentName = nameInput.value.trim();
                const currentBio = bioInput.value.trim();
                const nameChanged = currentName !== originalName;
                const bioChanged = currentBio !== originalBio;
                const avatarChanged = avatarFile !== null || currentAvatarUrl !== originalAvatarUrl;
                hasUnsavedChanges = nameChanged || bioChanged || avatarChanged;
                return hasUnsavedChanges;
            }

            // ================================================================
            // رفع الصورة إلى Supabase Storage مع إعادة المحاولة
            // ================================================================
            async function uploadAvatar(file, retries = 2) {
                const supabase = getSupabase();
                if (!supabase) throw new Error('Supabase غير متاح');

                const user = getCurrentUser();
                if (!user || !user.phone) throw new Error('المستخدم غير مسجل');

                // ضغط الصورة
                let processedFile = file;
                if (file.size > 2 * 1024 * 1024) {
                    try {
                        processedFile = await compressImage(file);
                    } catch (e) {
                        console.warn('⚠️ فشل ضغط الصورة، سيتم رفعها بحجمها الأصلي', e);
                    }
                }

                const fileExt = processedFile.name.split('.').pop() || 'jpg';
                const fileName = `${user.phone}_${Date.now()}.${fileExt}`;
                const filePath = `avatars/${fileName}`;

                let lastError = null;
                for (let attempt = 0; attempt <= retries; attempt++) {
                    try {
                        const { error: uploadError } = await supabase.storage
                            .from('ramz-images')
                            .upload(filePath, processedFile, {
                                cacheControl: '3600',
                                upsert: true,
                                contentType: processedFile.type || 'image/jpeg'
                            });

                        if (uploadError) throw uploadError;

                        const { data: urlData } = supabase.storage
                            .from('ramz-images')
                            .getPublicUrl(filePath);

                        return urlData.publicUrl;
                    } catch (err) {
                        console.warn(`⚠️ محاولة الرفع ${attempt + 1} فشلت:`, err);
                        lastError = err;
                        if (attempt < retries) {
                            await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
                        }
                    }
                }
                throw lastError || new Error('فشل رفع الصورة بعد عدة محاولات');
            }

            // ================================================================
            // ضغط الصورة
            // ================================================================
            function compressImage(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const maxSize = 800;
                            if (width > maxSize || height > maxSize) {
                                const ratio = Math.min(maxSize / width, maxSize / height);
                                width = Math.round(width * ratio);
                                height = Math.round(height * ratio);
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            canvas.toBlob((blob) => {
                                if (blob) {
                                    const compressedFile = new File([blob], file.name, { type: 'image/jpeg' });
                                    resolve(compressedFile);
                                } else {
                                    reject(new Error('فشل ضغط الصورة'));
                                }
                            }, 'image/jpeg', 0.8);
                        };
                        img.onerror = reject;
                        img.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            // ================================================================
            // حفظ التغييرات (محسّن بالكامل مع استخدام phone بدلاً من id)
            // ================================================================
            async function saveChanges() {
                const name = nameInput.value.trim();
                const bio = bioInput.value.trim();

                if (!name) {
                    toast('⚠️ الاسم مطلوب');
                    nameInput.focus();
                    return;
                }

                saveBtn.disabled = true;
                saveBtnBottom.disabled = true;
                loadingOverlay.classList.add('show');

                try {
                    const supabase = getSupabase();
                    const user = getCurrentUser();
                    if (!supabase || !user || !user.phone) {
                        throw new Error('بيانات المستخدم غير مكتملة (رقم الهاتف مطلوب)');
                    }

                    let avatarUrl = currentAvatarUrl;

                    if (avatarFile) {
                        try {
                            avatarUrl = await uploadAvatar(avatarFile);
                        } catch (uploadError) {
                            console.error('❌ فشل رفع الصورة:', uploadError);
                            toast('⚠️ فشل رفع الصورة: ' + (uploadError.message || 'خطأ في الشبكة أو صلاحيات التخزين'));
                            saveBtn.disabled = false;
                            saveBtnBottom.disabled = false;
                            loadingOverlay.classList.remove('show');
                            return;
                        }
                    }

                    const updates = {
                        name: name,
                        bio: bio,
                        avatar_url: avatarUrl || null,
                        updated_at: new Date().toISOString()
                    };

                    // استخدام phone بدلاً من id لأن جدول users يستخدم phone كمفتاح أساسي
                    const { error } = await supabase
                        .from('users')
                        .update(updates)
                        .eq('phone', user.phone);

                    if (error) throw error;

                    // تحديث جميع المتغيرات بعد نجاح الحفظ
                    originalName = name;
                    originalBio = bio;
                    originalAvatarUrl = avatarUrl;
                    currentAvatarUrl = avatarUrl;
                    avatarFile = null;

                    const updatedUser = {
                        ...user,
                        name: name,
                        bio: bio,
                        avatar: avatarUrl || null
                    };
                    localStorage.setItem('ramzapp_user', JSON.stringify(updatedUser));
                    if (window.inMemoryDB) window.inMemoryDB.user = updatedUser;

                    if (avatarUrl) {
                        displayAvatar(avatarUrl);
                    } else {
                        avatarPlaceholder.textContent = name.charAt(0).toUpperCase();
                        avatarPlaceholder.style.display = 'flex';
                        avatarImg.style.display = 'none';
                    }

                    hasUnsavedChanges = false;

                    const chats = window.getChats ? window.getChats() : [];
                    for (const chat of chats) {
                        if (chat.id === user.phone || chat.phone === user.phone) {
                            chat.name = name;
                            chat.avatar = avatarUrl || chat.avatar;
                            window.saveChat ? window.saveChat(chat) : null;
                        }
                    }

                    toast('✅ تم حفظ التغييرات بنجاح');

                    setTimeout(() => {
                        window.location.href = 'settings.html';
                    }, 1200);

                } catch (e) {
                    console.error('❌ فشل الحفظ:', e);
                    toast('❌ فشل حفظ التغييرات: ' + (e.message || 'خطأ غير معروف'));
                } finally {
                    saveBtn.disabled = false;
                    saveBtnBottom.disabled = false;
                    loadingOverlay.classList.remove('show');
                }
            }

            // ================================================================
            // حذف الصورة
            // ================================================================
            async function deleteAvatar() {
                if (!currentAvatarUrl && !originalAvatarUrl) {
                    toast('⚠️ لا توجد صورة لحذفها');
                    return;
                }
                if (!confirm('هل أنت متأكد من حذف الصورة؟')) return;

                currentAvatarUrl = null;
                avatarFile = null;
                avatarPlaceholder.textContent = (nameInput.value || 'م').charAt(0).toUpperCase();
                avatarPlaceholder.style.display = 'flex';
                avatarImg.style.display = 'none';
                avatarImg.src = '';
                hasUnsavedChanges = true;
                toast('🗑 تم حذف الصورة (اضغط حفظ لتأكيد التغيير)');
            }

            // ================================================================
            // ربط الأحداث
            // ================================================================
            document.addEventListener('DOMContentLoaded', function() {

                loadUserData();

                nameInput.addEventListener('input', () => {
                    updateCharCounts();
                    updateClearButton();
                    updateUnsavedChanges();
                });
                bioInput.addEventListener('input', () => {
                    updateCharCounts();
                    updateUnsavedChanges();
                });

                clearNameBtn.addEventListener('click', () => {
                    nameInput.value = '';
                    nameInput.focus();
                    updateCharCounts();
                    updateClearButton();
                    updateUnsavedChanges();
                });

                avatarWrapper.addEventListener('click', () => {
                    avatarInput.click();
                });

                avatarInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    if (!file.type.startsWith('image/')) {
                        toast('⚠️ يرجى اختيار صورة فقط');
                        return;
                    }
                    if (file.size > 10 * 1024 * 1024) {
                        toast('⚠️ حجم الصورة يجب أن يكون أقل من 10 ميجابايت');
                        return;
                    }

                    avatarFile = file;
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        displayAvatar(ev.target.result);
                        hasUnsavedChanges = true;
                    };
                    reader.readAsDataURL(file);
                    avatarInput.value = '';
                });

                saveBtn.addEventListener('click', saveChanges);
                saveBtnBottom.addEventListener('click', saveChanges);

                deletePhotoBtn.addEventListener('click', deleteAvatar);

                backBtn.addEventListener('click', () => {
                    updateUnsavedChanges();
                    if (hasUnsavedChanges) {
                        if (!confirm('⚠️ لديك تغييرات غير محفوظة. هل تريد المغادرة دون حفظ؟')) {
                            return;
                        }
                    }
                    window.location.href = 'settings.html';
                });

                nameInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        saveBtn.click();
                    }
                });

                bioInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                        e.preventDefault();
                        saveBtn.click();
                    }
                });

                window.addEventListener('beforeunload', (e) => {
                    updateUnsavedChanges();
                    if (hasUnsavedChanges) {
                        e.preventDefault();
                        e.returnValue = '⚠️ لديك تغييرات غير محفوظة. هل تريد المغادرة؟';
                        return e.returnValue;
                    }
                });

                console.log('✅ edit-profile.html (الإصدار النهائي v7.4) جاهز');
            });

            // ================================================================
            // دعم الوضع الليلي/النهاري
            // ================================================================
            function loadTheme() {
                const theme = localStorage.getItem('ramzapp_theme') || 'dark';
                document.body.classList.toggle('light-theme', theme === 'light');
            }
            loadTheme();

            window.addEventListener('storage', (e) => {
                if (e.key === 'ramzapp_theme') {
                    document.body.classList.toggle('light-theme', e.newValue === 'light');
                }
            });

        })();
    </script>

</body>
</html>
