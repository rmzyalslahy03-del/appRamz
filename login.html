<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RamzApp -  </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #222;
            --text: #fff;
            --text3: #999;
            --border: #2c2c2c;
            --accent: #ff0050;
            --accent2: #ff6b8a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text);
            animation: fadeIn 0.6s ease;
            padding: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 58px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }
        .subtitle {
            color: var(--text3);
            font-size: 14px;
            text-align: center;
            margin-top: -8px;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 340px;
        }
        .tab-row {
            display: flex;
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 8px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: var(--surface2);
            color: var(--text3);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #fff;
        }
        .login-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: inherit;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }
        .login-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 0, 80, 0.1);
        }
        .login-input::placeholder {
            color: var(--text3);
            opacity: 0.7;
        }
        .phone-row {
            display: flex;
            gap: 8px;
        }
        .phone-row select {
            width: 130px;
            padding: 15px 10px;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            text-align: center;
            outline: none;
            appearance: none;
            cursor: pointer;
        }
        .phone-row select option {
            background: var(--surface2);
        }
        .phone-row input {
            flex: 1;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-family: inherit;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .login-btn:hover {
            transform: scale(1.02);
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        .guest-btn {
            background: transparent !important;
            border: 2px solid var(--accent) !important;
            color: var(--accent) !important;
        }
        .guest-btn:hover {
            background: var(--accent) !important;
            color: #fff !important;
        }
        .hint {
            color: var(--text3);
            font-size: 11px;
            text-align: center;
            margin-top: 4px;
        }
        .error {
            color: #ff4444;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
            transition: all 0.2s;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        .guest-btn .loading-spinner {
            border-top-color: var(--accent);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn:disabled {
            opacity: 0.6;
            pointer-events: none;
        }
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            pointer-events: none;
        }
        .toast-msg {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            font-family: 'Cairo', sans-serif;
        }
        .toast-msg.show {
            opacity: 1;
        }
        @media (max-width: 400px) {
            .logo { font-size: 40px; }
            .phone-row select { width: 100px; }
        }
    </style>
</head>
<body>

    <div class="logo"> RamzApp</div>
    <div class="subtitle">   </div>

    <div class="form-container">
        <!--  -->
        <div class="tab-row">
            <button class="tab-btn active" id="tabEmail">  </button>
            <button class="tab-btn" id="tabPhone">  </button>
        </div>

        <!--    -->
        <div id="emailForm">
            <input type="email" class="login-input" id="emailInput" placeholder=" " autocomplete="email" dir="ltr">
            <input type="password" class="login-input" id="passwordInput" placeholder=" " autocomplete="current-password" dir="ltr">
            <div class="error" id="emailError"></div>
            <button class="login-btn" id="emailLoginBtn"><span id="emailBtnText"> </span></button>
        </div>

        <!--   -->
        <div id="phoneForm" style="display:none;">
            <div class="phone-row">
                <select id="countryCode">
                    <option value="+967"> +967</option>
                    <option value="+966"> +966</option>
                    <option value="+971"> +971</option>
                    <option value="+968"> +968</option>
                    <option value="+974"> +974</option>
                    <option value="+973"> +973</option>
                    <option value="+965"> +965</option>
                    <option value="+962"> +962</option>
                    <option value="+961"> +961</option>
                    <option value="+20"> +20</option>
                    <option value="+1"> +1</option>
                    <option value="+44"> +44</option>
                    <option value="+33"> +33</option>
                    <option value="+49"> +49</option>
                </select>
                <input type="tel" class="login-input" id="phoneInput" placeholder=" " dir="ltr">
            </div>
            <div class="error" id="phoneError"></div>
            <button class="login-btn" id="phoneLoginBtn"><span id="phoneBtnText"> </span></button>
        </div>

        <!--    -->
        <button class="login-btn guest-btn" id="guestBtn"><span id="guestBtnText">  </span></button>
        <p class="hint">    .    </p>
    </div>

    <!--   -->
    <div class="toast-container" id="toastContainer">
        <div class="toast-msg" id="toastMsg"></div>
    </div>

    <script>
        // ============================================================
        //       supabase.js
        //           supabase.js .
        //          .
        // ============================================================

        //   
        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            if (el) {
                el.textContent = message;
                setTimeout(() => { el.textContent = ''; }, 5000);
            }
        }

        function setLoading(buttonId, textId, isLoading, originalText) {
            const btn = document.getElementById(buttonId);
            const textEl = document.getElementById(textId);
            if (!btn || !textEl) return;
            if (isLoading) {
                btn.disabled = true;
                textEl.innerHTML = `<span class="loading-spinner"></span> ...`;
            } else {
                btn.disabled = false;
                textEl.textContent = originalText;
            }
        }

        function showToast(message, duration = 2000) {
            const container = document.getElementById('toastContainer');
            const msgEl = document.getElementById('toastMsg');
            if (!container || !msgEl) return;
            msgEl.textContent = message;
            msgEl.classList.add('show');
            clearTimeout(msgEl._hideTimer);
            msgEl._hideTimer = setTimeout(() => {
                msgEl.classList.remove('show');
            }, duration);
        }

        //      window ( supabase.js)
        function isSupabaseReady() {
            return typeof window.signInWithEmail === 'function' &&
                   typeof window.signInWithPhone === 'function' &&
                   typeof window.signInAsGuest === 'function';
        }

        //        supabase.js (    )
        //       .
        if (!isSupabaseReady()) {
            //  supabase.js   
            const script = document.createElement('script');
            script.src = 'supabase.js';
            script.onload = () => {
                console.log('   supabase.js ');
                //     
                bindEvents();
            };
            script.onerror = () => {
                console.error('   supabase.js     ');
                //      (   )
                window.signInWithEmail = async (email, password) => {
                    if (email && password) {
                        return { id: 'mock_' + Date.now(), email };
                    }
                    throw new Error('  ');
                };
                window.signInWithPhone = async (phone, name) => {
                    if (phone) {
                        return { id: 'mock_' + Date.now(), phone, name: name || '' };
                    }
                    throw new Error('  ');
                };
                window.signInAsGuest = async () => {
                    return { id: 'guest_' + Date.now(), email: 'guest@local' };
                };
                window.supabaseClient = {
                    from: () => ({ select: () => ({ single: async () => ({ data: null, error: null }) }) })
                };
                bindEvents();
            };
            document.head.appendChild(script);
        } else {
            bindEvents();
        }

        //   
        function bindEvents() {
            //  
            const tabEmail = document.getElementById('tabEmail');
            const tabPhone = document.getElementById('tabPhone');
            const emailForm = document.getElementById('emailForm');
            const phoneForm = document.getElementById('phoneForm');

            if (tabEmail && tabPhone) {
                tabEmail.addEventListener('click', () => {
                    tabEmail.classList.add('active');
                    tabPhone.classList.remove('active');
                    emailForm.style.display = 'block';
                    phoneForm.style.display = 'none';
                });
                tabPhone.addEventListener('click', () => {
                    tabPhone.classList.add('active');
                    tabEmail.classList.remove('active');
                    emailForm.style.display = 'none';
                    phoneForm.style.display = 'block';
                });
            }

            //   
            const emailLoginBtn = document.getElementById('emailLoginBtn');
            if (emailLoginBtn) {
                emailLoginBtn.addEventListener('click', async () => {
                    const email = document.getElementById('emailInput').value.trim();
                    const password = document.getElementById('passwordInput').value;
                    if (!email || !password) {
                        showError('emailError', '    ');
                        return;
                    }
                    if (!navigator.onLine) {
                        showError('emailError', '    ');
                        return;
                    }
                    setLoading('emailLoginBtn', 'emailBtnText', true, ' ');
                    try {
                        if (typeof window.signInWithEmail !== 'function') {
                            throw new Error('   ');
                        }
                        const user = await window.signInWithEmail(email, password);
                        //     Supabase ( supabaseClient)
                        let userData = { id: user.id, email: user.email, name: '', avatar: '', phone: '' };
                        if (window.supabaseClient) {
                            try {
                                const { data: profile } = await window.supabaseClient
                                    .from('users')
                                    .select('*')
                                    .eq('id', user.id)
                                    .single();
                                if (profile) {
                                    userData.name = profile.name || '';
                                    userData.avatar = profile.avatar || '';
                                    userData.phone = profile.phone || '';
                                }
                            } catch (e) {}
                        }
                        localStorage.setItem('ramzapp_user', JSON.stringify(userData));
                        showToast('  !');
                        setTimeout(() => window.location.href = 'index.html', 600);
                    } catch (err) {
                        showError('emailError', err.message || '  ');
                        setLoading('emailLoginBtn', 'emailBtnText', false, ' ');
                    }
                });
            }

            //   
            const phoneLoginBtn = document.getElementById('phoneLoginBtn');
            if (phoneLoginBtn) {
                phoneLoginBtn.addEventListener('click', async () => {
                    const countryCode = document.getElementById('countryCode').value;
                    let phone = document.getElementById('phoneInput').value.trim().replace(/[\s\-\(\)]/g, '');
                    if (!phone) {
                        showError('phoneError', '   ');
                        return;
                    }
                    if (phone.startsWith('0')) phone = phone.substring(1);
                    const fullPhone = countryCode + phone;
                    if (!navigator.onLine) {
                        showError('phoneError', '    ');
                        return;
                    }
                    setLoading('phoneLoginBtn', 'phoneBtnText', true, ' ');
                    try {
                        if (typeof window.signInWithPhone !== 'function') {
                            throw new Error('   ');
                        }
                        const user = await window.signInWithPhone(fullPhone);
                        const userData = {
                            id: user.id,
                            email: user.email || '',
                            name: user.name || '',
                            avatar: user.avatar || '',
                            phone: user.phone || fullPhone
                        };
                        localStorage.setItem('ramzapp_user', JSON.stringify(userData));
                        showToast('   ');
                        setTimeout(() => window.location.href = 'index.html', 600);
                    } catch (err) {
                        showError('phoneError', err.message || '  ');
                        setLoading('phoneLoginBtn', 'phoneBtnText', false, ' ');
                    }
                });
            }

            //  
            const guestBtn = document.getElementById('guestBtn');
            if (guestBtn) {
                guestBtn.addEventListener('click', async () => {
                    if (!navigator.onLine) {
                        showToast('    ');
                        return;
                    }
                    setLoading('guestBtn', 'guestBtnText', true, '  ');
                    try {
                        if (typeof window.signInAsGuest !== 'function') {
                            throw new Error('   ');
                        }
                        const user = await window.signInAsGuest();
                        const userData = {
                            id: user.id,
                            email: user.email || '',
                            name: '',
                            avatar: '',
                            phone: ''
                        };
                        localStorage.setItem('ramzapp_user', JSON.stringify(userData));
                        showToast('    ');
                        setTimeout(() => window.location.href = 'index.html', 600);
                    } catch (err) {
                        showToast('    : ' + err.message);
                        setLoading('guestBtn', 'guestBtnText', false, '  ');
                    }
                });
            }

            //     
            (async () => {
                const savedUser = localStorage.getItem('ramzapp_user');
                if (savedUser) {
                    try {
                        const user = JSON.parse(savedUser);
                        if (user && user.id) {
                            window.location.href = 'index.html';
                            return;
                        }
                    } catch (e) {}
                }
                //      Supabase  (  supabase.js)
                if (window.supabaseClient && typeof window.getCurrentSession === 'function') {
                    try {
                        const session = await window.getCurrentSession();
                        if (session) {
                            //   
                            const { data: profile } = await window.supabaseClient
                                .from('users')
                                .select('*')
                                .eq('id', session.user.id)
                                .single();
                            const userData = {
                                id: session.user.id,
                                email: session.user.email,
                                name: profile?.name || '',
                                avatar: profile?.avatar || '',
                                phone: profile?.phone || ''
                            };
                            localStorage.setItem('ramzapp_user', JSON.stringify(userData));
                            window.location.href = 'index.html';
                            return;
                        }
                    } catch (e) {}
                }
            })();

            //    Enter
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const activeTab = document.querySelector('.tab-btn.active');
                    if (activeTab && activeTab.id === 'tabEmail') {
                        document.getElementById('emailLoginBtn')?.click();
                    } else if (activeTab && activeTab.id === 'tabPhone') {
                        document.getElementById('phoneLoginBtn')?.click();
                    }
                }
            });
        }

        //           .
        console.log(' login.html (  ) ');
    </script>
</body>
</html>
