<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>RamzApp - تسجيل الدخول</title>

    <!-- ===== تحميل Supabase (للمصادقة والاستعلامات) ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <!-- ===== Font Awesome (مصادر متعددة) ===== -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://use.fontawesome.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.0/css/all.css">

    <!-- ===== Google Fonts ===== -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* ======================================================================
                   الأنماط الأساسية – متوافقة مع RamzApp v7.4
                   ====================================================================== */
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #222;
            --text: #fff;
            --text2: #ddd;
            --text3: #999;
            --border: #2c2c2c;
            --accent: #ff0050;
            --accent2: #ff6b8a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius: 20px;
            --font: 'Cairo', 'Segoe UI', 'Arial', sans-serif;
        }
        .light-theme {
            --bg: #f0f2f5;
            --surface: #fff;
            --surface2: #f5f5f5;
            --text: #111;
            --text2: #333;
            --text3: #667781;
            --border: #e0e0e0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: var(--font);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text);
            padding: 20px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 58px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }
        .subtitle {
            color: var(--text3);
            font-size: 14px;
            text-align: center;
            margin-top: -8px;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 340px;
        }
        .tab-row {
            display: flex;
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 8px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: var(--surface2);
            color: var(--text3);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #fff;
        }
        .login-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: inherit;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }
        .login-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 0, 80, 0.1);
        }
        .login-input::placeholder {
            color: var(--text3);
            opacity: 0.7;
        }
        .phone-row {
            display: flex;
            gap: 8px;
        }
        .phone-row select {
            width: 130px;
            padding: 15px 10px;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            text-align: center;
            outline: none;
            appearance: none;
            cursor: pointer;
        }
        .phone-row select option {
            background: var(--surface2);
        }
        .phone-row input {
            flex: 1;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-family: inherit;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .login-btn:hover {
            transform: scale(1.02);
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        .login-btn:disabled {
            opacity: 0.6;
            pointer-events: none;
        }
        .guest-btn {
            background: transparent !important;
            border: 2px solid var(--accent) !important;
            color: var(--accent) !important;
        }
        .guest-btn:hover {
            background: var(--accent) !important;
            color: #fff !important;
        }
        .hint {
            color: var(--text3);
            font-size: 11px;
            text-align: center;
            margin-top: 4px;
        }
        .error {
            color: #ff4444;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
            transition: all 0.2s;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        .guest-btn .loading-spinner {
            border-top-color: var(--accent);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            pointer-events: none;
        }
        .toast-msg {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            box-shadow: var(--shadow);
            font-family: var(--font);
        }
        .toast-msg.show {
            opacity: 1;
        }
        #statusBar {
            color: var(--text3);
            font-size: 12px;
            text-align: center;
            min-height: 20px;
            margin-top: 4px;
        }
        .auth-toggle {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 8px 0 12px;
        }
        .auth-toggle button {
            background: transparent;
            border: none;
            color: var(--text3);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .auth-toggle button.active {
            color: var(--accent);
            background: rgba(255, 0, 80, 0.1);
        }
        .auth-toggle button:hover {
            color: var(--text);
        }
        .extra-fields {
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        .extra-fields.show {
            display: flex;
        }
        @media (max-width: 400px) {
            .logo { font-size: 40px; }
            .phone-row select { width: 100px; }
        }
    </style>
</head>
<body>

    <!-- ===== الشعار ===== -->
    <div class="logo">💬 RamzApp</div>
    <div class="subtitle">تطبيق مراسلة آمن ومتكامل</div>
    <div id="statusBar">⏳ جاري التهيئة...</div>

    <!-- ===== حاوية النموذج ===== -->
    <div class="form-container">

        <!-- ===== تبويبات ===== -->
        <div class="tab-row">
            <button class="tab-btn active" id="tabEmail">📧 البريد الإلكتروني</button>
            <button class="tab-btn" id="tabPhone">📱 رقم الهاتف</button>
        </div>

        <!-- ============================================================
             نموذج البريد الإلكتروني (دخول / تسجيل)
             ============================================================ -->
        <div id="emailForm">
            <!-- أزرار التبديل بين تسجيل الدخول وإنشاء حساب -->
            <div class="auth-toggle">
                <button id="loginToggle" class="active">🔑 تسجيل الدخول</button>
                <button id="signupToggle">📝 إنشاء حساب</button>
            </div>

            <input type="email" class="login-input" id="emailInput" placeholder="البريد الإلكتروني" autocomplete="email" dir="ltr">
            <input type="password" class="login-input" id="passwordInput" placeholder="كلمة المرور" autocomplete="current-password" dir="ltr">

            <!-- الحقول الإضافية للتسجيل -->
            <div class="extra-fields" id="signupFields">
                <input type="password" class="login-input" id="confirmPasswordInput" placeholder="تأكيد كلمة المرور" dir="ltr">
                <input type="text" class="login-input" id="nameInput" placeholder="الاسم (اختياري)" dir="rtl">
            </div>

            <div class="error" id="emailError"></div>
            <button class="login-btn" id="emailLoginBtn"><span id="emailBtnText">🚀 دخول</span></button>
            <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px;" id="emailToggleHint">🔑 سجل دخولك باستخدام بريدك الإلكتروني</p>
        </div>

        <!-- ============================================================
             نموذج الهاتف (دخول / إنشاء حساب) – مع دعم تسجيل رقم جديد
             ============================================================ -->
        <div id="phoneForm" style="display:none;">
            <!-- أزرار التبديل بين تسجيل الدخول وإنشاء حساب -->
            <div class="auth-toggle">
                <button id="phoneLoginToggle" class="active">🔑 تسجيل الدخول</button>
                <button id="phoneSignupToggle">📝 إنشاء حساب</button>
            </div>

            <div class="phone-row">
                <select id="countryCode">
                    <option value="+967">🇾🇪 +967</option>
                    <option value="+966">🇸🇦 +966</option>
                    <option value="+971">🇦🇪 +971</option>
                    <option value="+968">🇴🇲 +968</option>
                    <option value="+974">🇶🇦 +974</option>
                    <option value="+973">🇧🇭 +973</option>
                    <option value="+965">🇰🇼 +965</option>
                    <option value="+962">🇯🇴 +962</option>
                    <option value="+961">🇱🇧 +961</option>
                    <option value="+20">🇪🇬 +20</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+44">🇬🇧 +44</option>
                    <option value="+33">🇫🇷 +33</option>
                    <option value="+49">🇩🇪 +49</option>
                </select>
                <input type="tel" class="login-input" id="phoneInput" placeholder="رقم الهاتف" dir="ltr">
            </div>

            <!-- حقل الاسم (يظهر فقط عند إنشاء حساب) -->
            <div id="phoneSignupFields" style="display:none;">
                <input type="text" class="login-input" id="phoneNameInput" placeholder="الاسم (اختياري)" dir="rtl">
            </div>

            <div class="error" id="phoneError"></div>
            <button class="login-btn" id="phoneLoginBtn"><span id="phoneBtnText">📱 متابعة</span></button>
            <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px;" id="phoneToggleHint">🔑 سجل دخولك برقم هاتفك المسجل</p>
        </div>

        <!-- ===== زر الدخول كضيف ===== -->
        <button class="login-btn guest-btn" id="guestBtn"><span id="guestBtnText">👤 الدخول كضيف</span></button>
        <p class="hint">يتم إنشاء حساب رسمي تلقائياً. ستتمكن من الدخول لاحقاً</p>
    </div>

    <!-- ===== حاوية التوست ===== -->
    <div class="toast-container" id="toastContainer">
        <div class="toast-msg" id="toastMsg"></div>
    </div>

    <!-- ===== تحميل supabase.js (يحتوي على دوال المصادقة) ===== -->
    <script src="supabase.js"></script>

    <script>
        // ============================================================
        // منع التنفيذ المتكرر
        // ============================================================
        if (window._loginInit) {
            console.warn('⚠️ login.html تم تهيئته مسبقاً، تجاهل التكرار');
        } else {
            window._loginInit = true;
            console.log('🚀 بدء تهيئة login.html (مع دعم تسجيل رقم جديد)');
        }

        // ============================================================
        // التحقق من الجلسة الحالية (مرة واحدة)
        // ============================================================
        (async function checkSession() {
            if (window._sessionChecked) return;
            window._sessionChecked = true;

            const savedUser = localStorage.getItem('ramzapp_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    if (user && user.id) {
                        console.log('👤 مستخدم موجود، التوجيه إلى index.html');
                        window.location.href = 'index.html';
                        return;
                    }
                } catch (e) {
                    console.warn('⚠️ بيانات المستخدم فاسدة، سيتم مسحها');
                    localStorage.removeItem('ramzapp_user');
                }
            }
            console.log('📌 لا يوجد مستخدم، عرض صفحة تسجيل الدخول');
            document.getElementById('statusBar').textContent = '✅ جاهز لتسجيل الدخول';
        })();

        // ============================================================
        // انتظار تحميل دوال supabase.js
        // ============================================================
        function waitForSupabase() {
            return new Promise((resolve) => {
                let attempts = 0;
                const check = () => {
                    attempts++;
                    if (typeof window.signInWithEmail === 'function' &&
                        typeof window.signUpWithEmail === 'function' &&
                        typeof window.signInWithPhone === 'function' &&
                        typeof window.signUpWithPhone === 'function' &&
                        typeof window.signInAsGuest === 'function') {
                        console.log('✅ دوال supabase.js جاهزة');
                        resolve(true);
                    } else if (attempts < 30) {
                        setTimeout(check, 300);
                    } else {
                        console.warn('⚠️ انتهى الوقت، دوال supabase.js غير متوفرة');
                        resolve(false);
                    }
                };
                check();
            });
        }

        // ============================================================
        // دوال مساعدة (UI)
        // ============================================================
        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            if (el) {
                el.textContent = message;
                setTimeout(() => { el.textContent = ''; }, 5000);
            }
        }

        function setLoading(buttonId, textId, isLoading, originalText) {
            const btn = document.getElementById(buttonId);
            const textEl = document.getElementById(textId);
            if (!btn || !textEl) return;
            if (isLoading) {
                btn.disabled = true;
                textEl.innerHTML = `<span class="loading-spinner"></span> جاري...`;
            } else {
                btn.disabled = false;
                textEl.textContent = originalText;
            }
        }

        function showToast(message, duration = 2000) {
            const container = document.getElementById('toastContainer');
            const msgEl = document.getElementById('toastMsg');
            if (!container || !msgEl) return;
            msgEl.textContent = message;
            msgEl.classList.add('show');
            clearTimeout(msgEl._hideTimer);
            msgEl._hideTimer = setTimeout(() => {
                msgEl.classList.remove('show');
            }, duration);
        }

        // ============================================================
        // ربط الأحداث الرئيسية
        // ============================================================
        document.addEventListener('DOMContentLoaded', async function() {
            const ready = await waitForSupabase();
            if (!ready) {
                showToast('⚠️ تعذر تحميل خدمات المصادقة، حاول تحديث الصفحة');
                document.getElementById('statusBar').textContent = '❌ فشل تحميل supabase.js';
            } else {
                document.getElementById('statusBar').textContent = '✅ جاهز لتسجيل الدخول';
            }

            // ====== تبديل التبويبات ======
            const tabEmail = document.getElementById('tabEmail');
            const tabPhone = document.getElementById('tabPhone');
            const emailForm = document.getElementById('emailForm');
            const phoneForm = document.getElementById('phoneForm');

            tabEmail.addEventListener('click', () => {
                tabEmail.classList.add('active');
                tabPhone.classList.remove('active');
                emailForm.style.display = 'block';
                phoneForm.style.display = 'none';
            });
            tabPhone.addEventListener('click', () => {
                tabPhone.classList.add('active');
                tabEmail.classList.remove('active');
                emailForm.style.display = 'none';
                phoneForm.style.display = 'block';
            });

            // ====== تبديل بين تسجيل الدخول وإنشاء حساب (البريد الإلكتروني) ======
            const loginToggle = document.getElementById('loginToggle');
            const signupToggle = document.getElementById('signupToggle');
            const signupFields = document.getElementById('signupFields');
            const emailBtnText = document.getElementById('emailBtnText');
            const emailHint = document.getElementById('emailToggleHint');

            function setEmailMode(mode) {
                if (mode === 'login') {
                    loginToggle.classList.add('active');
                    signupToggle.classList.remove('active');
                    signupFields.classList.remove('show');
                    emailBtnText.textContent = '🚀 دخول';
                    emailHint.textContent = '🔑 سجل دخولك باستخدام بريدك الإلكتروني';
                } else {
                    loginToggle.classList.remove('active');
                    signupToggle.classList.add('active');
                    signupFields.classList.add('show');
                    emailBtnText.textContent = '📝 إنشاء حساب';
                    emailHint.textContent = '📝 أنشئ حسابك الجديد مجاناً';
                }
            }

            loginToggle.addEventListener('click', () => setEmailMode('login'));
            signupToggle.addEventListener('click', () => setEmailMode('signup'));

            // ====== تبديل بين تسجيل الدخول وإنشاء حساب (الهاتف) ======
            const phoneLoginToggle = document.getElementById('phoneLoginToggle');
            const phoneSignupToggle = document.getElementById('phoneSignupToggle');
            const phoneSignupFields = document.getElementById('phoneSignupFields');
            const phoneBtnText = document.getElementById('phoneBtnText');
            const phoneToggleHint = document.getElementById('phoneToggleHint');

            function setPhoneMode(mode) {
                if (mode === 'login') {
                    phoneLoginToggle.classList.add('active');
                    phoneSignupToggle.classList.remove('active');
                    phoneSignupFields.style.display = 'none';
                    phoneBtnText.textContent = '📱 متابعة';
                    phoneToggleHint.textContent = '🔑 سجل دخولك برقم هاتفك المسجل';
                } else {
                    phoneLoginToggle.classList.remove('active');
                    phoneSignupToggle.classList.add('active');
                    phoneSignupFields.style.display = 'block';
                    phoneBtnText.textContent = '📝 إنشاء حساب';
                    phoneToggleHint.textContent = '📝 أنشئ حسابك الجديد برقم هاتفك';
                }
            }

            phoneLoginToggle.addEventListener('click', () => setPhoneMode('login'));
            phoneSignupToggle.addEventListener('click', () => setPhoneMode('signup'));

            // ====== معالج زر البريد الإلكتروني ======
            const emailLoginBtn = document.getElementById('emailLoginBtn');
            emailLoginBtn.addEventListener('click', async () => {
                const email = document.getElementById('emailInput').value.trim();
                const password = document.getElementById('passwordInput').value;
                const isSignup = signupToggle.classList.contains('active');

                if (!email || !password) {
                    showError('emailError', 'يرجى إدخال البريد وكلمة المرور');
                    return;
                }

                if (isSignup) {
                    const confirm = document.getElementById('confirmPasswordInput').value;
                    if (password !== confirm) {
                        showError('emailError', 'كلمة المرور غير متطابقة');
                        return;
                    }
                    if (password.length < 6) {
                        showError('emailError', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                        return;
                    }
                }

                if (!navigator.onLine) {
                    showError('emailError', '📡 لا يوجد اتصال بالإنترنت');
                    return;
                }

                const originalText = emailBtnText.textContent;
                setLoading('emailLoginBtn', 'emailBtnText', true, originalText);

                try {
                    let user;
                    if (isSignup) {
                        const name = document.getElementById('nameInput').value.trim() || 'مستخدم';
                        if (typeof window.signUpWithEmail !== 'function') {
                            throw new Error('خدمة التسجيل غير متاحة');
                        }
                        user = await window.signUpWithEmail(email, password, name);
                        showToast('✅ تم إنشاء الحساب بنجاح! جاري تسجيل الدخول...');
                    } else {
                        if (typeof window.signInWithEmail !== 'function') {
                            throw new Error('خدمة تسجيل الدخول غير متاحة');
                        }
                        user = await window.signInWithEmail(email, password);
                        showToast('✅ مرحباً بعودتك!');
                    }

                    let userData = {
                        id: user.id,
                        email: user.email,
                        name: user.user_metadata?.name || 'مستخدم',
                        avatar: '👤',
                        phone: ''
                    };
                    if (window.supabaseClient) {
                        try {
                            const { data: profile } = await window.supabaseClient
                                .from('users')
                                .select('*')
                                .eq('id', user.id)
                                .single();
                            if (profile) {
                                userData.name = profile.name || userData.name;
                                userData.avatar = profile.avatar_url || '👤';
                                userData.phone = profile.phone || '';
                            }
                        } catch (e) {}
                    }
                    localStorage.setItem('ramzapp_user', JSON.stringify(userData));
                    window.location.href = 'index.html';
                } catch (err) {
                    console.error('❌ فشل العملية:', err);
                    showError('emailError', err.message || 'فشل العملية');
                    setLoading('emailLoginBtn', 'emailBtnText', false, originalText);
                }
            });

            // ====== معالج زر الهاتف (دخول / إنشاء حساب جديد) ======
            const phoneLoginBtn = document.getElementById('phoneLoginBtn');
            phoneLoginBtn.addEventListener('click', async () => {
                const countryCode = document.getElementById('countryCode').value;
                let phone = document.getElementById('phoneInput').value.trim().replace(/[\s\-\(\)]/g, '');

                if (!phone) {
                    showError('phoneError', 'يرجى إدخال رقم الهاتف');
                    return;
                }
                if (phone.startsWith('0')) phone = phone.substring(1);
                const fullPhone = countryCode + phone;

                if (!navigator.onLine) {
                    showError('phoneError', '📡 لا يوجد اتصال بالإنترنت');
                    return;
                }

                const isSignup = phoneSignupToggle.classList.contains('active');
                const originalText = phoneBtnText.textContent;
                setLoading('phoneLoginBtn', 'phoneBtnText', true, originalText);

                try {
                    let user;
                    if (isSignup) {
                        // ===== إنشاء حساب جديد برقم الهاتف =====
                        const name = document.getElementById('phoneNameInput').value.trim() || 'مستخدم';
                        if (typeof window.signUpWithPhone !== 'function') {
                            throw new Error('خدمة التسجيل غير متاحة');
                        }
                        user = await window.signUpWithPhone(fullPhone, name);
                        showToast('✅ تم إنشاء الحساب بنجاح! جاري تسجيل الدخول...');
                    } else {
                        // ===== تسجيل الدخول برقم الهاتف =====
                        if (typeof window.signInWithPhone !== 'function') {
                            throw new Error('خدمة تسجيل الدخول غير متاحة');
                        }
                        user = await window.signInWithPhone(fullPhone);
                        showToast('✅ مرحباً بعودتك!');
                    }

                    const userData = {
                        id: user.id,
                        phone: user.phone || fullPhone,
                        name: user.name || 'مستخدم',
                        avatar: user.avatar || '👤',
                        public_key: user.public_key || null
                    };
                    localStorage.setItem('ramzapp_user', JSON.stringify(userData));

                    // تحديث inMemoryDB إذا كان موجوداً
                    if (window.inMemoryDB) {
                        window.inMemoryDB.user = userData;
                    }

                    window.location.href = 'index.html';
                } catch (err) {
                    console.error('❌ فشل العملية:', err);
                    showError('phoneError', err.message || 'فشل العملية');
                    setLoading('phoneLoginBtn', 'phoneBtnText', false, originalText);
                }
            });

            // ====== الدخول كضيف ======
            const guestBtn = document.getElementById('guestBtn');
            guestBtn.addEventListener('click', async () => {
                if (!navigator.onLine) {
                    showToast('📡 لا يوجد اتصال بالإنترنت');
                    return;
                }
                setLoading('guestBtn', 'guestBtnText', true, '👤 الدخول كضيف');
                try {
                    if (typeof window.signInAsGuest !== 'function') {
                        throw new Error('خدمة المصادقة غير متاحة');
                    }
                    const user = await window.signInAsGuest();
                    const userData = {
                        id: user.id,
                        email: user.email || '',
                        name: 'زائر',
                        avatar: '👤',
                        phone: ''
                    };
                    localStorage.setItem('ramzapp_user', JSON.stringify(userData));
                    showToast('✅ تم إنشاء حساب ضيف');
                    window.location.href = 'index.html';
                } catch (err) {
                    showToast('❌ فشل إنشاء حساب الضيف: ' + err.message);
                    setLoading('guestBtn', 'guestBtnText', false, '👤 الدخول كضيف');
                }
            });

            // ====== دعم الضغط على Enter ======
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const activeTab = document.querySelector('.tab-btn.active');
                    if (activeTab && activeTab.id === 'tabEmail') {
                        document.getElementById('emailLoginBtn')?.click();
                    } else if (activeTab && activeTab.id === 'tabPhone') {
                        document.getElementById('phoneLoginBtn')?.click();
                    }
                }
            });

            console.log('✅ login.html (النسخة النهائية مع دعم تسجيل رقم جديد) جاهز');
        });
    </script>

</body>
</html>
