<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>رابط مراسلة | RamzApp</title>

    <!-- ===== تحميل Supabase أولاً (للاستعلام عن المستخدمين) ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- ===== Font Awesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* ======================================================================
                   الأنماط الأساسية – متوافقة مع RamzApp v5.0
                   ====================================================================== */
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #222;
            --text: #fff;
            --text2: #ddd;
            --text3: #999;
            --accent: #ff0050;
            --accent2: #ff6b8a;
            --green: #00a884;
            --border: #2c2c2c;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --font: 'Cairo', 'Segoe UI', 'Arial', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: var(--font);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: var(--text);
            padding: 20px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 8px;
        }

        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 30px 24px;
            width: 360px;
            max-width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: popIn 0.4s ease;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            margin: 0 auto 16px;
            border: 3px solid var(--accent);
            color: var(--text);
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }
        .status {
            color: var(--text3);
            font-size: 14px;
            margin-bottom: 22px;
        }
        .status .online { color: var(--green); }
        .status .offline { color: var(--text3); }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 0, 80, 0.35); }
        .btn:active { transform: scale(0.96); }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-secondary {
            background: transparent !important;
            border: 2px solid var(--accent) !important;
            color: var(--accent) !important;
        }
        .btn-secondary:hover {
            background: var(--accent) !important;
            color: #fff !important;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
        .error-msg {
            color: #ff4444;
            font-size: 14px;
            margin-top: 12px;
        }
        .info-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text3);
            font-size: 12px;
            margin-top: 16px;
        }
        .info-row i { color: var(--green); }

        .footer {
            color: var(--text3);
            font-size: 11px;
            text-align: center;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 13px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            font-family: var(--font);
            box-shadow: var(--shadow);
        }
        .toast.show { opacity: 1; }

        @media (max-width: 400px) {
            .logo { font-size: 36px; }
            .card { padding: 24px 18px; }
            .avatar { width: 72px; height: 72px; font-size: 32px; }
            .name { font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- ===== الشعار ===== -->
    <div class="logo">💬 RamzApp</div>

    <!-- ===== البطاقة الرئيسية ===== -->
    <div class="card" id="card">

        <!-- حالة التحميل -->
        <div id="loadingState">
            <span class="spinner"></span>
            <span style="color: var(--text3);">جاري التحقق من الرابط...</span>
        </div>

        <!-- المحتوى الرئيسي (يظهر بعد التحميل) -->
        <div id="contentState" class="hidden">
            <div class="avatar" id="userAvatar">?</div>
            <div class="name" id="userName">...</div>
            <div class="status" id="userStatus">...</div>

            <!-- زر فتح المحادثة (للمستخدمين المسجلين) -->
            <button class="btn" id="openChatBtn" style="display:none;">
                <i class="fas fa-comment-dots"></i> فتح المحادثة
            </button>

            <!-- زر تسجيل الدخول (لغير المسجلين) -->
            <button class="btn btn-secondary" id="loginFirstBtn" style="display:none;">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول أولاً
            </button>

            <!-- زر التحميل أثناء الانتظار -->
            <button class="btn" id="loadingBtn" style="display:none;" disabled>
                <span class="spinner"></span> جاري...
            </button>

            <div class="error-msg" id="errorMsg"></div>

            <!-- معلومات إضافية -->
            <div class="info-row" id="infoRow" style="display:none;">
                <i class="fas fa-lock"></i>
                <span>مشفر من طرف إلى طرف</span>
            </div>
        </div>
    </div>

    <div class="footer">© 2026 RamzApp v5.0 | جميع الحقوق محفوظة</div>

    <!-- ===== Toast Container ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== تحميل supabase.js (إن وجد) ===== -->
    <script src="supabase.js"></script>

    <script>
        (function() {
            'use strict';

            // ================================================================
            // دوال مساعدة
            // ================================================================
            function toast(message, duration = 2500) {
                const el = document.getElementById('toast');
                el.textContent = message;
                el.classList.add('show');
                clearTimeout(el._hideTimer);
                el._hideTimer = setTimeout(() => el.classList.remove('show'), duration);
            }

            function getCurrentUser() {
                try {
                    const raw = localStorage.getItem('ramzapp_user');
                    return raw ? JSON.parse(raw) : null;
                } catch(e) { return null; }
            }

            function getSupabase() {
                if (window.supabaseClient) return window.supabaseClient;
                if (typeof supabaseJs !== 'undefined' && supabaseJs.createClient) {
                    const client = supabaseJs.createClient(
                        'https://serlegwdzjulfcxabxzv.supabase.co',
                        'sb_publishable_4_c97KxnG_7HTvfv-pKeNQ_FTlnK6Yx'
                    );
                    window.supabaseClient = client;
                    return client;
                }
                return null;
            }

            // ================================================================
            // قراءة معاملات الرابط
            // ================================================================
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');        // UUID قديم
            const targetPhone = urlParams.get('phone');  // رقم الهاتف (جديد)
            const refCode = urlParams.get('ref');        // رمز الدعوة

            // ================================================================
            // عناصر DOM
            // ================================================================
            const loadingState = document.getElementById('loadingState');
            const contentState = document.getElementById('contentState');
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userStatus = document.getElementById('userStatus');
            const openChatBtn = document.getElementById('openChatBtn');
            const loginFirstBtn = document.getElementById('loginFirstBtn');
            const loadingBtn = document.getElementById('loadingBtn');
            const errorMsg = document.getElementById('errorMsg');
            const infoRow = document.getElementById('infoRow');

            // ================================================================
            // التحقق من صحة الرابط
            // ================================================================
            if (!targetId && !targetPhone && !refCode) {
                loadingState.innerHTML = `
                    <span style="color: #ff4444; font-size: 32px; display: block; margin-bottom: 8px;">❌</span>
                    <span style="color: var(--text3);">رابط غير صالح</span>
                    <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="margin-top:16px;">
                        <i class="fas fa-home"></i> العودة للرئيسية
                    </button>
                `;
                throw new Error('رابط غير صالح');
            }

            // ================================================================
            // دوال البحث عن المستخدم
            // ================================================================
            async function findUserByPhone(phone) {
                const supabase = getSupabase();
                if (!supabase) throw new Error('تعذر الاتصال بقاعدة البيانات');
                const { data, error } = await supabase
                    .from('users')
                    .select('id, phone, name, avatar_url, is_online, last_seen')
                    .eq('phone', phone)
                    .single();
                if (error || !data) throw new Error('المستخدم غير موجود');
                return data;
            }

            async function findUserById(id) {
                const supabase = getSupabase();
                if (!supabase) throw new Error('تعذر الاتصال بقاعدة البيانات');
                const { data, error } = await supabase
                    .from('users')
                    .select('id, phone, name, avatar_url, is_online, last_seen')
                    .eq('id', id)
                    .single();
                if (error || !data) throw new Error('المستخدم غير موجود');
                return data;
            }

            async function findUserByRef(ref) {
                const supabase = getSupabase();
                if (!supabase) throw new Error('تعذر الاتصال بقاعدة البيانات');
                const { data, error } = await supabase
                    .from('users')
                    .select('id, phone, name, avatar_url, is_online, last_seen')
                    .eq('invite_code', ref)
                    .single();
                if (error || !data) throw new Error('المستخدم غير موجود');
                return data;
            }

            // ================================================================
            // فتح المحادثة
            // ================================================================
            function openChatWithUser(userId, userPhone) {
                // تخزين معرف المستخدم للرجوع إليه في index.html
                localStorage.setItem('ramzapp_deep_link_target', userId);
                localStorage.setItem('ramzapp_deep_link_phone', userPhone);
                // الانتقال إلى التطبيق
                window.location.href = 'index.html?openChat=' + userId;
            }

            // ================================================================
            // التهيئة الرئيسية
            // ================================================================
            (async function init() {
                try {
                    let targetUser = null;

                    // 1. البحث عن المستخدم حسب المعامل المتاح
                    if (targetPhone) {
                        targetUser = await findUserByPhone(targetPhone);
                    } else if (targetId) {
                        targetUser = await findUserById(targetId);
                    } else if (refCode) {
                        targetUser = await findUserByRef(refCode);
                    }

                    if (!targetUser) {
                        throw new Error('المستخدم غير موجود');
                    }

                    // 2. عرض البيانات
                    loadingState.classList.add('hidden');
                    contentState.classList.remove('hidden');

                    // الصورة الرمزية
                    if (targetUser.avatar_url && targetUser.avatar_url.startsWith('http')) {
                        userAvatar.innerHTML = `<img src="${targetUser.avatar_url}" alt="avatar">`;
                    } else {
                        userAvatar.textContent = targetUser.name?.charAt(0) || '?';
                    }

                    // الاسم
                    userName.textContent = targetUser.name || 'مستخدم';

                    // الحالة
                    if (targetUser.is_online) {
                        userStatus.innerHTML = '🟢 <span class="online">متصل الآن</span> - يريد مراسلتك';
                    } else {
                        const lastSeen = targetUser.last_seen ? new Date(targetUser.last_seen) : null;
                        let timeText = '';
                        if (lastSeen) {
                            const diff = Math.floor((Date.now() - lastSeen.getTime()) / 1000);
                            if (diff < 60) timeText = 'الآن';
                            else if (diff < 3600) timeText = Math.floor(diff / 60) + ' د';
                            else if (diff < 86400) timeText = Math.floor(diff / 3600) + ' س';
                            else timeText = Math.floor(diff / 86400) + ' يوم';
                            userStatus.innerHTML = `📅 آخر ظهور <span class="offline">${timeText}</span>`;
                        } else {
                            userStatus.innerHTML = '📱 غير متصل حالياً';
                        }
                    }

                    // إظهار معلومات التشفير
                    infoRow.style.display = 'flex';

                    // 3. التحقق من حالة تسجيل الدخول للمستخدم الحالي
                    const currentUser = getCurrentUser();

                    if (currentUser && currentUser.id) {
                        // المستخدم مسجل الدخول
                        openChatBtn.style.display = 'block';
                        loginFirstBtn.style.display = 'none';

                        // إذا كان المستخدم الحالي هو نفس المستخدم المستهدف
                        if (currentUser.id === targetUser.id) {
                            openChatBtn.textContent = '👤 هذا أنت!';
                            openChatBtn.disabled = true;
                            openChatBtn.style.opacity = '0.6';
                            userStatus.innerHTML = '📌 هذا حسابك الشخصي';
                        } else {
                            openChatBtn.textContent = '💬 فتح المحادثة';
                            openChatBtn.disabled = false;

                            // محاولة الانتقال التلقائي بعد 2.5 ثانية
                            setTimeout(() => {
                                openChatWithUser(targetUser.id, targetUser.phone);
                            }, 2500);

                            // إضافة مؤشر الانتقال التلقائي
                            const autoHint = document.createElement('p');
                            autoHint.style.cssText =
                                'color: var(--text3); font-size: 12px; margin-top: 12px; animation: pulse 1.5s infinite;';
                            autoHint.textContent = '⏳ جاري فتح المحادثة تلقائياً...';
                            contentState.appendChild(autoHint);

                            // ربط زر فتح المحادثة
                            openChatBtn.addEventListener('click', () => {
                                if (!openChatBtn.disabled) {
                                    openChatWithUser(targetUser.id, targetUser.phone);
                                }
                            });
                        }
                    } else {
                        // المستخدم غير مسجل الدخول
                        openChatBtn.style.display = 'none';
                        loginFirstBtn.style.display = 'block';

                        // تخزين معرف المستخدم المستهدف للرجوع إليه بعد تسجيل الدخول
                        localStorage.setItem('ramzapp_deep_link_target', targetUser.id);
                        localStorage.setItem('ramzapp_deep_link_phone', targetUser.phone);

                        loginFirstBtn.addEventListener('click', () => {
                            window.location.href = 'login.html';
                        });

                        // إضافة تنبيه
                        const hint = document.createElement('p');
                        hint.style.cssText = 'color: var(--text3); font-size: 12px; margin-top: 12px;';
                        hint.textContent = '🔐 يجب تسجيل الدخول لفتح المحادثة';
                        contentState.appendChild(hint);
                    }

                } catch (err) {
                    console.error('❌ خطأ:', err);
                    loadingState.innerHTML = `
                        <span style="color: #ff4444; font-size: 32px; display: block; margin-bottom: 8px;">⚠️</span>
                        <span style="color: var(--text3);">${err.message || 'حدث خطأ غير متوقع'}</span>
                        <button class="btn btn-secondary" onclick="location.reload()" style="margin-top:16px;">
                            <i class="fas fa-redo"></i> إعادة المحاولة
                        </button>
                        <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="margin-top:8px;">
                            <i class="fas fa-home"></i> العودة للرئيسية
                        </button>
                    `;
                }
            })();

            // ================================================================
            // دعم الانتقال التلقائي بعد تسجيل الدخول (عودة من login.html)
            // ================================================================
            document.addEventListener('DOMContentLoaded', function() {
                // إذا كان هناك target محفوظ ولم نستخدمه بعد (من login.html)
                const savedTarget = localStorage.getItem('ramzapp_deep_link_target');
                const savedPhone = localStorage.getItem('ramzapp_deep_link_phone');
                if (savedTarget && savedPhone) {
                    // التحقق من أننا وصلنا من login.html
                    const currentUser = getCurrentUser();
                    if (currentUser && currentUser.id) {
                        // تنظيف التخزين
                        localStorage.removeItem('ramzapp_deep_link_target');
                        localStorage.removeItem('ramzapp_deep_link_phone');
                        // فتح المحادثة مباشرة
                        openChatWithUser(savedTarget, savedPhone);
                    }
                }
            });

            console.log('✅ redirect.html (الإصدار النهائي v5.0) جاهز');
        })();
    </script>

    <style>
        /* ===== إضافة مؤشر نبض للانتقال التلقائي ===== */
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>

</body>
</html>
